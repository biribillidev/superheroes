<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="./script.js" defer></script>

    <title>Super Heroes</title>
</head>
<body class="bg-slate-900 text-slate-200 p-4">

    <h1 class="text-3xl font-bold">Super Heroes</h1>
    <span>Seu cadastro de heróis brasileiro</span>

    <main class="mt-6 grid gap-4 lg:grid-cols-2 lg:items-start">
        <section class="rounded-lg border border-slate-700 bg-slate-800 p-4">
            <h2 class="text-xl font-semibold mb-3">Criar herói</h2>

            <form id="hero-form" class="space-y-3">
                <div>
                    <label for="name" class="block text-sm mb-1">Nome</label>
                    <input id="name" name="name" type="text" required class="w-full rounded border border-slate-600 bg-slate-900 px-3 py-2" />
                </div>

                <div>
                    <label for="superPower" class="block text-sm mb-1">Super poder</label>
                    <input id="superPower" name="superPower" type="text" required class="w-full rounded border border-slate-600 bg-slate-900 px-3 py-2" />
                </div>

                <div>
                    <label for="level" class="block text-sm mb-1">Nível</label>
                    <input id="level" name="level" type="number" min="1" value="1" required class="w-full rounded border border-slate-600 bg-slate-900 px-3 py-2" />
                </div>

                <label class="inline-flex items-center gap-2">
                    <input id="isAlive" name="isAlive" type="checkbox" checked class="h-4 w-4" />
                    <span>Está vivo</span>
                </label>

                <button type="submit" class="w-full rounded bg-blue-600 px-3 py-2 font-medium hover:bg-blue-500">Criar herói</button>
            </form>

            <p id="form-message" class="mt-3 text-sm"></p>
        </section>

        <section class="rounded-lg border border-slate-700 bg-slate-800 p-4">
            <h2 class="text-xl font-semibold mb-3">Heróis</h2>
            <ul id="heroes-list" class="space-y-2"></ul>
        </section>
    </main>

</body>
</html>
